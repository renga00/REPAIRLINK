<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Red Drop Connect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #fdfdfd;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeInLoader 1.5s ease-out forwards;
      z-index: 9999;
    }

    @keyframes fadeInLoader {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .blood-drop {
      width: 160px;
      height: 160px;
      object-fit: contain;
      animation: netflixIntro 2.5s ease-out forwards, glow 3s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 12px red);
    }

    @keyframes netflixIntro {
      0% {
        transform: scale(0.2);
        opacity: 0;
        filter: blur(10px);
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
        filter: blur(0px);
      }
      100% {
        transform: scale(1);
        opacity: 1;
        filter: none;
      }
    }

    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 10px red);
      }
      100% {
        filter: drop-shadow(0 0 30px #ff4d4d);
      }
    }

    .logo-name {
      font-size: 36px;
      font-weight: bold;
      margin-top: 20px;
      background: linear-gradient(to right, #ff4d4d, #ffffff, #a30000);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
    }

    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .tagline {
      font-size: 18px;
      color: #ccc;
      font-style: italic;
      margin-top: 8px;
      animation: fadeInUp 2s ease;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Loader with Netflix-style animation -->
  <div id="loader">
    <img src="login.png" alt="Red Drop Logo" class="blood-drop">
    <div class="logo-name">RED DROP CONNECT</div>
    <div class="tagline">"The Gift of Life"</div>
  </div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.location.href = "home.html"; // Redirects to home.html
      }, 3000); // Wait for animation to complete
    });
  </script>

</body>
</html>
